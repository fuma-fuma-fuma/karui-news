name: Fetch News

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Fetch news
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: python scripts/fetch_news.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add data/news.json
          git diff --quiet && git diff --staged --quiet || git commit -m "update news"
          git push
